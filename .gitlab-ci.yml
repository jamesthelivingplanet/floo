# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
- test
- secret-detection
- build
- release
sast:
  stage: test
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
variables:
  SECRET_DETECTION_ENABLED: 'true'
secret_detection:
  stage: secret-detection

cargo_test:
  stage: test
  image: rust:latest
  script:
  - cd rust
  - cargo build --release
  - cargo test

# Release pipeline: on a git tag, cross-compile floo for the supported targets,
# upload each binary to the generic package registry, and attach them to a
# GitLab Release. SQLite is bundled (rusqlite "bundled" feature), so each
# target only needs a working C cross-toolchain at build time and the resulting
# binary has no system libsqlite3 dependency.

.build:
  stage: build
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - rustup target add "$TARGET"
  - cargo build --release --target "$TARGET" --manifest-path rust/Cargo.toml
  - mkdir -p dist
  - cp "rust/target/$TARGET/release/floo" "dist/floo-$TARGET"
  - |
    curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
      --upload-file "dist/floo-$TARGET" \
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/floo/${CI_COMMIT_TAG}/floo-$TARGET"
  artifacts:
    paths:
    - dist/
    expire_in: never

build:linux:x86_64:
  extends: .build
  image: rust:latest
  variables:
    TARGET: x86_64-unknown-linux-gnu

build:linux:aarch64:
  extends: .build
  image: rust:latest
  variables:
    TARGET: aarch64-unknown-linux-gnu
    CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
    AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  before_script:
  - apt-get update && apt-get install --yes gcc-aarch64-linux-gnu

# macOS builds require GitLab SaaS macOS runners (tag saas-macos-medium-m1),
# which run on Apple Silicon. The Apple toolchain cross-builds the Intel
# (x86_64-apple-darwin) target from the same runner.
.build_macos:
  extends: .build
  tags:
  - saas-macos-medium-m1
  image: macos-14-xcode-15
  before_script:
  - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  - source "$HOME/.cargo/env"

build:macos:aarch64:
  extends: .build_macos
  variables:
    TARGET: aarch64-apple-darwin

build:macos:x86_64:
  extends: .build_macos
  variables:
    TARGET: x86_64-apple-darwin

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
  - if: $CI_COMMIT_TAG
  needs:
  - build:linux:x86_64
  - build:linux:aarch64
  - build:macos:x86_64
  - build:macos:aarch64
  script:
  - echo "Publishing floo release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: floo $CI_COMMIT_TAG
    description: 'Prebuilt floo binaries for $CI_COMMIT_TAG. Download the binary for your platform from the assets below, then follow the README install section.'
    assets:
      links:
      - name: floo-x86_64-unknown-linux-gnu
        url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/floo/${CI_COMMIT_TAG}/floo-x86_64-unknown-linux-gnu
      - name: floo-aarch64-unknown-linux-gnu
        url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/floo/${CI_COMMIT_TAG}/floo-aarch64-unknown-linux-gnu
      - name: floo-x86_64-apple-darwin
        url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/floo/${CI_COMMIT_TAG}/floo-x86_64-apple-darwin
      - name: floo-aarch64-apple-darwin
        url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/floo/${CI_COMMIT_TAG}/floo-aarch64-apple-darwin
